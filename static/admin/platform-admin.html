<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第三方平台集成管理 - OCR智能预审系统</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="stylesheet" href="/static/css/modals.css">
    <style>
        .platform-admin {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .admin-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            text-align: center;
        }

        .admin-header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 300;
        }

        .admin-header p {
            margin: 10px 0 0;
            opacity: 0.9;
        }

        .admin-tabs {
            display: flex;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            overflow: hidden;
        }

        .admin-tab {
            flex: 1;
            padding: 15px 20px;
            background: #f8f9fa;
            border: none;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .admin-tab.active {
            background: #667eea;
            color: white;
        }

        .admin-tab:hover {
            background: #5a67d8;
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stats-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            text-align: center;
        }

        .stats-card h3 {
            margin: 0 0 10px;
            font-size: 32px;
            font-weight: bold;
        }

        .stats-card p {
            margin: 0;
            color: #666;
        }

        .clients-table {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .table-header {
            background: #f8f9fa;
            padding: 20px;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .client-table {
            width: 100%;
            border-collapse: collapse;
        }

        .client-table th,
        .client-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e9ecef;
        }

        .client-table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #495057;
        }

        .client-table tr:hover {
            background: #f8f9fa;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-enabled {
            background: #d4edda;
            color: #155724;
        }

        .status-disabled {
            background: #f8d7da;
            color: #721c24;
        }

        .permissions-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .permission-tag {
            background: #e9ecef;
            color: #495057;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #495057;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 6px;
            margin: 20px 0;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 6px;
            margin: 20px 0;
        }

        .api-usage-chart {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="platform-admin">
        <div class="admin-header">
            <h1>🚀 第三方平台集成管理</h1>
            <p>管理API网关、客户端认证和调用量统计</p>
        </div>

        <div class="admin-tabs">
            <button class="admin-tab active" onclick="switchTab('overview')">📊 平台概览</button>
            <button class="admin-tab" onclick="switchTab('clients')">👥 客户端管理</button>
            <button class="admin-tab" onclick="switchTab('statistics')">📈 调用统计</button>
            <button class="admin-tab" onclick="switchTab('configuration')">⚙️ 平台配置</button>
        </div>

        <div id="overview" class="tab-content active">
            <div class="stats-cards">
                <div class="stats-card">
                    <h3 id="total-clients">-</h3>
                    <p>总客户端数</p>
                </div>
                <div class="stats-card">
                    <h3 id="active-clients">-</h3>
                    <p>活跃客户端</p>
                </div>
                <div class="stats-card">
                    <h3 id="today-calls">-</h3>
                    <p>今日API调用</p>
                </div>
                <div class="stats-card">
                    <h3 id="success-rate">-</h3>
                    <p>成功率</p>
                </div>
            </div>

            <div class="api-usage-chart">
                <h3>📈 API调用趋势</h3>
                <div id="usage-chart" style="height: 300px; display: flex; align-items: center; justify-content: center; color: #6c757d;">
                    调用量图表将在这里显示 (可集成Chart.js)
                </div>
            </div>
        </div>

        <div id="clients" class="tab-content">
            <div class="clients-table">
                <div class="table-header">
                    <h3>🔐 API客户端列表</h3>
                    <div class="table-actions">
                        <button class="btn btn-primary" onclick="showAddClientModal()">+ 添加客户端</button>
                        <button class="btn btn-secondary" onclick="refreshClients()">🔄 刷新</button>
                    </div>
                </div>
                <div id="clients-loading" class="loading">加载客户端列表...</div>
                <table class="client-table" id="clients-table" style="display: none;">
                    <thead>
                        <tr>
                            <th>客户端ID</th>
                            <th>客户端名称</th>
                            <th>组织</th>
                            <th>状态</th>
                            <th>权限</th>
                            <th>今日调用</th>
                            <th>成功率</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="clients-tbody">
                    </tbody>
                </table>
            </div>
        </div>

        <div id="statistics" class="tab-content">
            <div class="api-usage-chart">
                <h3>📊 API调用详细统计</h3>
                <div id="statistics-content" class="loading">加载统计数据...</div>
            </div>
        </div>

        <div id="configuration" class="tab-content">
            <div class="clients-table">
                <div class="table-header">
                    <h3>⚙️ 平台配置管理</h3>
                    <div class="table-actions">
                        <button class="btn btn-primary" onclick="saveConfiguration()">💾 保存配置</button>
                    </div>
                </div>
                <div style="padding: 30px;">
                    <div id="config-loading" class="loading">加载配置信息...</div>
                    <div id="config-form" style="display: none;">
                        <div class="form-group">
                            <label>
                                <input type="checkbox" id="platform-enabled"> 启用第三方平台访问
                            </label>
                        </div>
                        <div class="form-group">
                            <label>
                                <input type="checkbox" id="signature-required"> 要求请求签名验证
                            </label>
                        </div>
                        <div class="form-group">
                            <label>时间戳容差 (秒)</label>
                            <input type="number" id="timestamp-tolerance" placeholder="300">
                        </div>
                        <div class="form-group">
                            <label>
                                <input type="checkbox" id="rate-limiting-enabled"> 启用调用量限制
                            </label>
                        </div>
                        <div class="form-group">
                            <label>每分钟调用限制</label>
                            <input type="number" id="requests-per-minute" placeholder="60">
                        </div>
                        <div class="form-group">
                            <label>每小时调用限制</label>
                            <input type="number" id="requests-per-hour" placeholder="1000">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="add-client-modal" class="modal">
        <div class="modal-content">
            <h3>➕ 添加新客户端</h3>
            <form id="add-client-form">
                <div class="form-group">
                    <label>客户端名称 *</label>
                    <input type="text" id="client-name" required>
                </div>
                <div class="form-group">
                    <label>组织/公司 *</label>
                    <input type="text" id="client-organization" required>
                </div>
                <div class="form-group">
                    <label>联系邮箱 *</label>
                    <input type="email" id="client-email" required>
                </div>
                <div class="form-group">
                    <label>权限选择</label>
                    <div>
                        <label><input type="checkbox" value="preview"> 预审权限</label>
                        <label><input type="checkbox" value="status"> 状态查询</label>
                        <label><input type="checkbox" value="result"> 结果下载</label>
                        <label><input type="checkbox" value="statistics"> 统计查询</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>申请说明</label>
                    <textarea id="client-description" rows="3"></textarea>
                </div>
                <div class="table-actions">
                    <button type="submit" class="btn btn-primary">创建客户端</button>
                    <button type="button" class="btn btn-secondary" onclick="hideAddClientModal()">取消</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script>
        const platformAdmin = {
            currentTab: 'overview',
            clients: [],
            platformStats: null,
            config: null
        };

        document.addEventListener('DOMContentLoaded', function() {
            initializePlatformAdmin();
        });

        function initializePlatformAdmin() {
            loadPlatformStats();
            loadClients();
            loadConfiguration();
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.admin-tab').forEach(tab => {
                tab.classList.remove('active');
            });

            document.getElementById(tabName).classList.add('active');
            document.querySelector(`[onclick="switchTab('${tabName}')"]`).classList.add('active');
            
            platformAdmin.currentTab = tabName;

            switch(tabName) {
                case 'overview':
                    loadPlatformStats();
                    break;
                case 'clients':
                    loadClients();
                    break;
                case 'statistics':
                    loadStatistics();
                    break;
                case 'configuration':
                    loadConfiguration();
                    break;
            }
        }

        async function loadPlatformStats() {
            try {
                const response = await fetch('/api/admin/platform/stats/platform');
                const result = await response.json();
                
                if (result.success) {
                    const stats = result.data;
                    document.getElementById('total-clients').textContent = stats.total_clients;
                    document.getElementById('active-clients').textContent = stats.active_clients;
                    document.getElementById('today-calls').textContent = stats.total_api_calls_today;
                    document.getElementById('success-rate').textContent = '98.5%';
                    
                    platformAdmin.platformStats = stats;
                } else {
                    console.error('加载平台统计失败:', result.error);
                }
            } catch (error) {
                console.error('加载平台统计异常:', error);
            }
        }

        async function loadClients() {
            document.getElementById('clients-loading').style.display = 'block';
            document.getElementById('clients-table').style.display = 'none';
            
            try {
                const response = await fetch('/api/admin/platform/clients');
                const result = await response.json();
                
                if (result.success) {
                    platformAdmin.clients = result.data.clients;
                    renderClientsTable();
                } else {
                    showError('加载客户端列表失败: ' + result.error);
                }
            } catch (error) {
                showError('加载客户端列表异常: ' + error.message);
            } finally {
                document.getElementById('clients-loading').style.display = 'none';
                document.getElementById('clients-table').style.display = 'table';
            }
        }

        function renderClientsTable() {
            const tbody = document.getElementById('clients-tbody');
            tbody.innerHTML = '';
            
            platformAdmin.clients.forEach(client => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><code>${client.client_id}</code></td>
                    <td>${client.client_name}</td>
                    <td>${client.organization}</td>
                    <td>
                        <span class="status-badge ${client.enabled ? 'status-enabled' : 'status-disabled'}">
                            ${client.enabled ? '已启用' : '已禁用'}
                        </span>
                    </td>
                    <td>
                        <div class="permissions-tags">
                            ${client.permissions.map(p => `<span class="permission-tag">${p}</span>`).join('')}
                        </div>
                    </td>
                    <td>${client.call_stats.calls_today}</td>
                    <td>${client.call_stats.success_rate.toFixed(1)}%</td>
                    <td>
                        <button class="btn btn-secondary" onclick="viewClientDetails('${client.client_id}')">查看</button>
                        ${client.enabled ? 
                            `<button class="btn btn-danger" onclick="disableClient('${client.client_id}')">禁用</button>` :
                            `<button class="btn btn-success" onclick="enableClient('${client.client_id}')">启用</button>`
                        }
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        async function loadStatistics() {
            const content = document.getElementById('statistics-content');
            content.innerHTML = '加载统计数据...';
            
            try {
                const response = await fetch('/api/admin/platform/stats/clients');
                const result = await response.json();
                
                content.innerHTML = `
                    <pre style="background: #f8f9fa; padding: 20px; border-radius: 6px; overflow: auto;">
${JSON.stringify(result, null, 2)}
                    </pre>
                `;
            } catch (error) {
                content.innerHTML = '<div class="error-message">加载统计数据失败: ' + error.message + '</div>';
            }
        }

        async function loadConfiguration() {
            document.getElementById('config-loading').style.display = 'block';
            document.getElementById('config-form').style.display = 'none';
            
            try {
                const response = await fetch('/api/admin/platform/config');
                const result = await response.json();
                
                if (result.success) {
                    const config = result.data;
                    document.getElementById('platform-enabled').checked = config.enabled;
                    document.getElementById('signature-required').checked = config.signature.required;
                    document.getElementById('timestamp-tolerance').value = config.signature.timestamp_tolerance;
                    document.getElementById('rate-limiting-enabled').checked = config.rate_limiting.enabled;
                    document.getElementById('requests-per-minute').value = config.rate_limiting.requests_per_minute;
                    document.getElementById('requests-per-hour').value = config.rate_limiting.requests_per_hour;
                    
                    platformAdmin.config = config;
                } else {
                    showError('加载配置失败: ' + result.error);
                }
            } catch (error) {
                showError('加载配置异常: ' + error.message);
            } finally {
                document.getElementById('config-loading').style.display = 'none';
                document.getElementById('config-form').style.display = 'block';
            }
        }

        function showAddClientModal() {
            document.getElementById('add-client-modal').style.display = 'block';
        }

        function hideAddClientModal() {
            document.getElementById('add-client-modal').style.display = 'none';
            document.getElementById('add-client-form').reset();
        }

        function refreshClients() {
            loadClients();
        }

        function viewClientDetails(clientId) {
            alert('查看客户端详情: ' + clientId);
        }

        async function enableClient(clientId) {
            try {
                const response = await fetch(`/api/admin/platform/clients/${clientId}/enable`, {
                    method: 'POST'
                });
                const result = await response.json();
                
                if (result.success) {
                    showSuccess('客户端已启用');
                    loadClients();
                } else {
                    showError('启用失败: ' + result.error);
                }
            } catch (error) {
                showError('操作异常: ' + error.message);
            }
        }

        async function disableClient(clientId) {
            if (confirm('确定要禁用此客户端吗？')) {
                try {
                    const response = await fetch(`/api/admin/platform/clients/${clientId}`, {
                        method: 'DELETE'
                    });
                    const result = await response.json();
                    
                    if (result.success) {
                        showSuccess('客户端已禁用');
                        loadClients();
                    } else {
                        showError('禁用失败: ' + result.error);
                    }
                } catch (error) {
                    showError('操作异常: ' + error.message);
                }
            }
        }

        document.getElementById('add-client-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = {
                client_name: document.getElementById('client-name').value,
                organization: document.getElementById('client-organization').value,
                contact_email: document.getElementById('client-email').value,
                requested_permissions: Array.from(document.querySelectorAll('#add-client-modal input[type="checkbox"]:checked')).map(cb => cb.value),
                description: document.getElementById('client-description').value
            };
            
            try {
                const response = await fetch('/api/admin/platform/clients', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                const result = await response.json();
                
                if (result.success) {
                    showSuccess('客户端创建成功！请保存密钥: ' + result.data.secret_key);
                    hideAddClientModal();
                    loadClients();
                } else {
                    showError('创建失败: ' + result.error);
                }
            } catch (error) {
                showError('创建异常: ' + error.message);
            }
        });

        async function saveConfiguration() {
            const configData = {
                enabled: document.getElementById('platform-enabled').checked,
                signature: {
                    required: document.getElementById('signature-required').checked,
                    timestamp_tolerance: parseInt(document.getElementById('timestamp-tolerance').value)
                },
                rate_limiting: {
                    enabled: document.getElementById('rate-limiting-enabled').checked,
                    requests_per_minute: parseInt(document.getElementById('requests-per-minute').value),
                    requests_per_hour: parseInt(document.getElementById('requests-per-hour').value)
                }
            };
            
            try {
                const response = await fetch('/api/admin/platform/config', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(configData)
                });
                const result = await response.json();
                
                if (result.success) {
                    showSuccess('配置保存成功');
                } else {
                    showError('保存失败: ' + result.error);
                }
            } catch (error) {
                showError('保存异常: ' + error.message);
            }
        }

        function showError(message) {
            alert('错误: ' + message);
        }

        function showSuccess(message) {
            alert('成功: ' + message);
        }

        window.onclick = function(event) {
            const modal = document.getElementById('add-client-modal');
            if (event.target == modal) {
                hideAddClientModal();
            }
        }
    </script>
</body>
</html>
