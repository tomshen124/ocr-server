<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>监控中心 - OCR智能预审系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Microsoft YaHei", "微软雅黑", Arial, sans-serif;
            background: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }
        
        /* 头部样式 */
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
        }
        
        .header-title {
            display: flex;
            align-items: center;
            font-size: 22px;
            font-weight: bold;
        }
        
        .header-title .icon {
            margin-right: 12px;
            font-size: 28px;
        }
        
        .header-nav {
            display: flex;
            gap: 24px;
        }
        
        .header-nav a {
            color: white;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 4px;
            transition: background-color 0.3s;
            font-weight: 500;
        }
        
        .header-nav a:hover {
            background-color: rgba(255,255,255,0.2);
        }

        /* 认证状态显示 */
        .auth-status {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }

        .auth-status.authenticated {
            color: #52c41a;
        }

        .auth-status.unauthenticated {
            color: #ff4d4f;
        }
        
        /* 主容器 */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Tab 导航 */
        .tab-nav {
            background: white;
            border-radius: 8px 8px 0 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            overflow-x: auto;
        }

        .tab-nav button {
            background: none;
            border: none;
            padding: 16px 24px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            color: #666;
            transition: all 0.3s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-nav button:hover {
            background: #f0f0f0;
            color: #333;
        }

        .tab-nav button.active {
            color: #1890ff;
            border-bottom: 2px solid #1890ff;
            background: #f0f9ff;
        }

        /* Tab 内容 */
        .tab-content {
            background: white;
            border-radius: 0 0 8px 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            min-height: 500px;
        }

        .tab-pane {
            display: none;
            padding: 24px;
        }

        .tab-pane.active {
            display: block;
        }

        /* 统计卡片 */
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: #fafafa;
            padding: 16px;
            border-radius: 6px;
            border-left: 4px solid #1890ff;
            text-align: center;
        }
        
        .stat-card.success {
            border-left-color: #52c41a;
        }
        
        .stat-card.warning {
            border-left-color: #faad14;
        }
        
        .stat-card.error {
            border-left-color: #ff4d4f;
        }
        
        .stat-card h3 {
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
        }
        
        .stat-card .value {
            font-size: 24px;
            font-weight: bold;
            color: #1890ff;
        }
        
        .stat-card.success .value {
            color: #52c41a;
        }
        
        .stat-card.warning .value {
            color: #faad14;
        }
        
        .stat-card.error .value {
            color: #ff4d4f;
        }

        /* 数据表格 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        
        .data-table th,
        .data-table td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .data-table th {
            background: #fafafa;
            font-weight: 600;
            color: #333;
            font-size: 13px;
        }
        
        .data-table td {
            color: #666;
        }
        
        .data-table tbody tr:hover {
            background: #f9f9f9;
        }

        /* 过滤器 */
        .filters {
            background: #fafafa;
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 16px;
        }
        
        .filters-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            align-items: end;
        }
        
        .filter-group {
            display: flex;
            flex-direction: column;
        }
        
        .filter-group label {
            margin-bottom: 4px;
            font-weight: 600;
            color: #333;
            font-size: 13px;
        }
        
        .filter-group input,
        .filter-group select {
            padding: 6px 10px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 13px;
        }

        /* 状态标签 */
        .status-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
        }
        
        .status-pending {
            background: #fff1f0;
            color: #ff4d4f;
        }
        
        .status-processing {
            background: #e6f7ff;
            color: #1890ff;
        }
        
        .status-completed {
            background: #f6ffed;
            color: #52c41a;
        }
        
        .status-failed {
            background: #fff2e8;
            color: #fa8c16;
        }

        /* 按钮样式 */
        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        
        .btn-primary {
            background: #1890ff;
            color: white;
        }
        
        .btn-primary:hover {
            background: #40a9ff;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 1px solid #d9d9d9;
        }
        
        .btn-secondary:hover {
            background: #e6e6e6;
        }
        
        .btn-small {
            padding: 3px 8px;
            font-size: 11px;
        }

        /* 工具栏 */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .toolbar h2 {
            font-size: 16px;
            color: #333;
        }

        .toolbar-actions {
            display: flex;
            gap: 8px;
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        /* 登录表单 */
        .login-form {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 4px;
            font-weight: 600;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
        }

        .form-group input:focus {
            border-color: #1890ff;
            outline: none;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .main-container {
                padding: 16px;
            }
            
            .stats-cards {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            
            .filters-row {
                grid-template-columns: 1fr;
            }
            
            .header-content {
                flex-direction: column;
                gap: 12px;
            }
            
            .header-nav {
                flex-wrap: wrap;
                justify-content: center;
            }

            .tab-nav {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <!-- 头部导航 -->
    <div class="header">
        <div class="header-content">
            <div class="header-title">
                <span class="icon">📊</span>
                监控中心
            </div>
            <div class="auth-status" id="authStatus">
                <span>未登录</span>
                <button class="btn btn-secondary btn-small" onclick="logout()" id="logoutBtn" style="display: none;">登出</button>
            </div>
            <div class="header-nav">
                <a href="/static/index.html">预审页面</a>
                <a href="/static/test-tools.html">测试工具</a>
            </div>
        </div>
    </div>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- Tab 导航 -->
        <div class="tab-nav">
            <button class="active" onclick="switchTab('business')" id="tab-business">
                📈 业务统计
            </button>
            <button onclick="switchTab('system')" id="tab-system">
                🖥️ 系统监控
            </button>
            <button onclick="switchTab('auth')" id="tab-auth">
                🔐 监控认证
            </button>
        </div>

        <!-- Tab 内容 -->
        <div class="tab-content">
            <!-- 业务统计 Tab -->
            <div class="tab-pane active" id="business-pane">
                <!-- 统计卡片 -->
                <div class="stats-cards">
                    <div class="stat-card">
                        <h3>总预审次数</h3>
                        <div class="value" id="totalCount">-</div>
                    </div>
                    <div class="stat-card success">
                        <h3>成功完成</h3>
                        <div class="value" id="completedCount">-</div>
                    </div>
                    <div class="stat-card warning">
                        <h3>处理中</h3>
                        <div class="value" id="processingCount">-</div>
                    </div>
                    <div class="stat-card error">
                        <h3>处理失败</h3>
                        <div class="value" id="failedCount">-</div>
                    </div>
                </div>

                <!-- 过滤器 -->
                <div class="filters">
                    <div class="filters-row">
                        <div class="filter-group">
                            <label for="dateFrom">开始日期</label>
                            <input type="date" id="dateFrom">
                        </div>
                        <div class="filter-group">
                            <label for="dateTo">结束日期</label>
                            <input type="date" id="dateTo">
                        </div>
                        <div class="filter-group">
                            <label for="statusFilter">状态</label>
                            <select id="statusFilter">
                                <option value="">全部状态</option>
                                <option value="pending">待处理</option>
                                <option value="processing">处理中</option>
                                <option value="completed">已完成</option>
                                <option value="failed">处理失败</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label for="matterFilter">事项名称</label>
                            <input type="text" id="matterFilter" placeholder="搜索事项名称">
                        </div>
                        <div style="display: flex; gap: 8px; align-items: end;">
                            <button class="btn btn-primary" onclick="applyFilters()">🔍 查询</button>
                            <button class="btn btn-secondary" onclick="resetFilters()">🔄 重置</button>
                        </div>
                    </div>
                </div>

                <!-- 工具栏 -->
                <div class="toolbar">
                    <h2>预审记录列表</h2>
                    <div class="toolbar-actions">
                        <button class="btn btn-secondary" onclick="exportBusinessData()">📥 导出</button>
                        <button class="btn btn-primary" onclick="refreshBusinessData()">🔄 刷新</button>
                    </div>
                </div>
                
                <!-- 表格内容 -->
                <div id="businessTableContent">
                    <div class="loading">正在加载数据...</div>
                </div>
            </div>

            <!-- 系统监控 Tab -->
            <div class="tab-pane" id="system-pane">
                <!-- 系统指标卡片 -->
                <div class="stats-cards">
                    <div class="stat-card">
                        <h3>CPU使用率</h3>
                        <div class="value" id="cpuUsage">-</div>
                    </div>
                    <div class="stat-card">
                        <h3>内存使用率</h3>
                        <div class="value" id="memoryUsage">-</div>
                    </div>
                    <div class="stat-card">
                        <h3>磁盘使用率</h3>
                        <div class="value" id="diskUsage">-</div>
                    </div>
                    <div class="stat-card">
                        <h3>OCR进程状态</h3>
                        <div class="value" id="ocrStatus">-</div>
                    </div>
                </div>

                <!-- 工具栏 -->
                <div class="toolbar">
                    <h2>系统监控详情</h2>
                    <div class="toolbar-actions">
                        <button class="btn btn-secondary" onclick="exportSystemData()">📥 导出</button>
                        <button class="btn btn-primary" onclick="refreshSystemData()">🔄 刷新</button>
                    </div>
                </div>

                <!-- 系统监控详情 -->
                <div id="systemTableContent">
                    <div class="loading">正在加载系统数据...</div>
                </div>
            </div>

            <!-- 监控认证 Tab -->
            <div class="tab-pane" id="auth-pane">
                <!-- 认证状态 -->
                <div id="authContent">
                    <!-- 登录表单 -->
                    <div class="login-form" id="loginForm">
                        <h2 style="text-align: center; margin-bottom: 20px;">监控系统登录</h2>
                        <div class="form-group">
                            <label for="username">用户名</label>
                            <input type="text" id="username" placeholder="请输入用户名" value="admin">
                        </div>
                        <div class="form-group">
                            <label for="password">密码</label>
                            <input type="password" id="password" placeholder="请输入密码">
                        </div>
                        <div class="form-group">
                            <button class="btn btn-primary" onclick="login()" style="width: 100%;">登录</button>
                        </div>
                        <p style="text-align: center; color: #666; font-size: 12px;">
                            默认账户：admin / admin!@#123
                        </p>
                    </div>

                    <!-- 认证成功后的管理界面 -->
                    <div id="authManagement" style="display: none;">
                        <div class="stats-cards">
                            <div class="stat-card">
                                <h3>活跃会话数</h3>
                                <div class="value" id="activeSessions">-</div>
                            </div>
                            <div class="stat-card">
                                <h3>登录次数</h3>
                                <div class="value" id="loginCount">-</div>
                            </div>
                            <div class="stat-card">
                                <h3>当前用户</h3>
                                <div class="value" id="currentUser">-</div>
                            </div>
                            <div class="stat-card">
                                <h3>会话状态</h3>
                                <div class="value" id="sessionStatus">-</div>
                            </div>
                        </div>

                        <div class="toolbar">
                            <h2>会话管理</h2>
                            <div class="toolbar-actions">
                                <button class="btn btn-secondary" onclick="cleanupSessions()">🧹 清理过期会话</button>
                                <button class="btn btn-primary" onclick="refreshAuthData()">🔄 刷新</button>
                            </div>
                        </div>

                        <div id="authTableContent">
                            <p style="text-align: center; padding: 40px; color: #666;">
                                会话管理功能正常运行中
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let currentPage = 1;
        let pageSize = 20;
        let currentFilters = {};
        let authSession = null;

        // 页面初始化
        document.addEventListener('DOMContentLoaded', function() {
            initializePage();
            checkAuthStatus();
            
            // 设置默认日期范围（最近7天）
            const today = new Date();
            const weekAgo = new Date(today.getTime() - 7 * 24 * 60 * 60 * 1000);
            
            document.getElementById('dateTo').value = today.toISOString().split('T')[0];
            document.getElementById('dateFrom').value = weekAgo.toISOString().split('T')[0];
        });

        // 初始化页面
        function initializePage() {
            console.log('监控中心页面初始化');
            loadBusinessData();
        }

        // 切换Tab
        function switchTab(tabName) {
            // 移除所有active类
            document.querySelectorAll('.tab-nav button').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));

            // 添加active类到当前tab
            document.getElementById(`tab-${tabName}`).classList.add('active');
            document.getElementById(`${tabName}-pane`).classList.add('active');

            // 根据tab加载对应数据
            switch(tabName) {
                case 'business':
                    loadBusinessData();
                    break;
                case 'system':
                    loadSystemData();
                    break;
                case 'auth':
                    // 认证tab不需要自动加载数据
                    break;
            }
        }

        // 检查认证状态
        async function checkAuthStatus() {
            try {
                const sessionId = localStorage.getItem('monitor_session_id');
                if (!sessionId) {
                    updateAuthStatus(false);
                    return;
                }

                const response = await fetch(`/api/monitor/auth/status?session_id=${sessionId}`);
                if (response.ok) {
                    const data = await response.json();
                    if (data.success && data.data) {
                        authSession = sessionId;
                        updateAuthStatus(true);
                        showAuthManagement();
                    } else {
                        updateAuthStatus(false);
                    }
                } else {
                    updateAuthStatus(false);
                }
            } catch (error) {
                console.error('检查认证状态失败:', error);
                updateAuthStatus(false);
            }
        }

        // 更新认证状态显示
        function updateAuthStatus(isAuthenticated) {
            const authStatus = document.getElementById('authStatus');
            const logoutBtn = document.getElementById('logoutBtn');

            if (isAuthenticated) {
                authStatus.className = 'auth-status authenticated';
                authStatus.querySelector('span').textContent = '已登录';
                logoutBtn.style.display = 'inline-flex';
            } else {
                authStatus.className = 'auth-status unauthenticated';
                authStatus.querySelector('span').textContent = '未登录';
                logoutBtn.style.display = 'none';
                localStorage.removeItem('monitor_session_id');
                authSession = null;
            }
        }

        // 登录
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (!username || !password) {
                alert('请输入用户名和密码');
                return;
            }

            try {
                const response = await fetch('/api/monitor/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                
                if (data.success && data.session) {
                    localStorage.setItem('monitor_session_id', data.session.id);
                    authSession = data.session.id;
                    updateAuthStatus(true);
                    showAuthManagement();
                    alert('登录成功');
                } else {
                    alert('登录失败: ' + data.message);
                }
            } catch (error) {
                console.error('登录失败:', error);
                alert('登录失败，请稍后重试');
            }
        }

        // 登出
        async function logout() {
            if (!authSession) return;

            try {
                await fetch(`/api/monitor/auth/logout?session_id=${authSession}`, {
                    method: 'POST'
                });
            } catch (error) {
                console.error('登出请求失败:', error);
            }

            updateAuthStatus(false);
            showLoginForm();
        }

        // 显示登录表单
        function showLoginForm() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('authManagement').style.display = 'none';
        }

        // 显示认证管理界面
        function showAuthManagement() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('authManagement').style.display = 'block';
            refreshAuthData();
        }

        // 刷新认证数据
        async function refreshAuthData() {
            if (!authSession) return;

            // 更新统计数据
            document.getElementById('activeSessions').textContent = '1';
            document.getElementById('loginCount').textContent = '-';
            document.getElementById('currentUser').textContent = 'admin';
            document.getElementById('sessionStatus').textContent = '活跃';
        }

        // 清理过期会话
        async function cleanupSessions() {
            if (!authSession) return;

            try {
                const response = await fetch(`/api/monitor/auth/cleanup?session_id=${authSession}`, {
                    method: 'POST'
                });

                if (response.ok) {
                    const data = await response.json();
                    alert(`已清理 ${data.data || 0} 个过期会话`);
                    refreshAuthData();
                } else {
                    alert('清理会话失败');
                }
            } catch (error) {
                console.error('清理会话失败:', error);
                alert('清理会话失败，请稍后重试');
            }
        }

        // 加载业务数据
        function loadBusinessData() {
            loadStatistics();
            loadPreviewRecords();
        }

        // 加载统计数据
        async function loadStatistics() {
            try {
                const response = await fetch('/api/preview/statistics');
                if (response.ok) {
                    const data = await response.json();
                    if (data.success) {
                        updateStatisticsDisplay(data.data);
                    }
                }
            } catch (error) {
                console.error('加载统计数据失败:', error);
                updateStatisticsDisplay({
                    total: 0,
                    completed: 0,
                    processing: 0,
                    failed: 0
                });
            }
        }

        // 更新统计显示
        function updateStatisticsDisplay(stats) {
            document.getElementById('totalCount').textContent = stats.total || 0;
            document.getElementById('completedCount').textContent = stats.completed || 0;
            document.getElementById('processingCount').textContent = stats.processing || 0;
            document.getElementById('failedCount').textContent = stats.failed || 0;
        }

        // 加载预审记录
        async function loadPreviewRecords() {
            const tableContent = document.getElementById('businessTableContent');
            tableContent.innerHTML = '<div class="loading">正在加载数据...</div>';

            try {
                const params = new URLSearchParams({
                    page: currentPage,
                    size: pageSize,
                    ...currentFilters
                });

                const response = await fetch(`/api/preview/records?${params}`);
                if (response.ok) {
                    const data = await response.json();
                    if (data.success) {
                        displayPreviewRecords(data.data.records || []);
                    } else {
                        showEmptyState(tableContent, '数据加载失败: ' + data.errorMsg);
                    }
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
            } catch (error) {
                console.error('加载预审记录失败:', error);
                showEmptyState(tableContent, '数据加载失败，请稍后重试');
            }
        }

        // 显示预审记录
        function displayPreviewRecords(records) {
            const tableContent = document.getElementById('businessTableContent');
            
            if (!records || records.length === 0) {
                showEmptyState(tableContent, '暂无数据');
                return;
            }

            const table = `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>预审ID</th>
                            <th>第三方请求ID</th>
                            <th>事项名称</th>
                            <th>用户ID</th>
                            <th>状态</th>
                            <th>请求时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${records.map(record => `
                            <tr>
                                <td><code style="font-size: 11px;">${record.id || '-'}</code></td>
                                <td><code style="font-size: 11px;">${record.third_party_request_id || '-'}</code></td>
                                <td>${record.matter_name || '-'}</td>
                                <td>${record.user_id || '-'}</td>
                                <td>${formatStatus(record.status)}</td>
                                <td>${formatDateTime(record.created_at)}</td>
                                <td>
                                    <button class="btn btn-small btn-primary" onclick="viewPreview('${record.id}')">查看</button>
                                    ${record.status === 'completed' ? 
                                        `<button class="btn btn-small btn-secondary" onclick="downloadResult('${record.id}')">下载</button>` : 
                                        ''
                                    }
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            tableContent.innerHTML = table;
        }

        // 加载系统数据
        async function loadSystemData() {
            loadSystemMetrics();
            loadSystemDetails();
        }

        // 加载系统指标
        async function loadSystemMetrics() {
            try {
                const response = await fetch('/api/monitoring/status');
                if (response.ok) {
                    const data = await response.json();
                    updateSystemMetrics(data);
                }
            } catch (error) {
                console.error('加载系统指标失败:', error);
                updateSystemMetrics({});
            }
        }

        // 更新系统指标显示
        function updateSystemMetrics(metrics) {
            document.getElementById('cpuUsage').textContent = (metrics.cpu_usage || 0) + '%';
            document.getElementById('memoryUsage').textContent = (metrics.memory_usage || 0) + '%';
            document.getElementById('diskUsage').textContent = (metrics.disk_usage || 0) + '%';
            document.getElementById('ocrStatus').textContent = metrics.ocr_status || '未知';
        }

        // 加载系统详情
        async function loadSystemDetails() {
            const tableContent = document.getElementById('systemTableContent');
            tableContent.innerHTML = '<div class="loading">正在加载系统数据...</div>';

            try {
                const response = await fetch('/api/health/details');
                if (response.ok) {
                    const data = await response.json();
                    displaySystemDetails(data);
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
            } catch (error) {
                console.error('加载系统详情失败:', error);
                showEmptyState(tableContent, '系统数据加载失败，请稍后重试');
            }
        }

        // 显示系统详情
        function displaySystemDetails(details) {
            const tableContent = document.getElementById('systemTableContent');
            
            const table = `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>组件</th>
                            <th>状态</th>
                            <th>详情</th>
                            <th>最后检查时间</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>数据库连接</td>
                            <td>${formatStatus(details.database ? 'completed' : 'failed')}</td>
                            <td>${details.database ? '连接正常' : '连接异常'}</td>
                            <td>${new Date().toLocaleString('zh-CN')}</td>
                        </tr>
                        <tr>
                            <td>存储系统</td>
                            <td>${formatStatus(details.storage ? 'completed' : 'failed')}</td>
                            <td>${details.storage ? '存储正常' : '存储异常'}</td>
                            <td>${new Date().toLocaleString('zh-CN')}</td>
                        </tr>
                        <tr>
                            <td>OCR服务</td>
                            <td>${formatStatus(details.ocr ? 'completed' : 'warning')}</td>
                            <td>${details.ocr ? 'OCR服务正常' : 'OCR服务检查中'}</td>
                            <td>${new Date().toLocaleString('zh-CN')}</td>
                        </tr>
                    </tbody>
                </table>
            `;

            tableContent.innerHTML = table;
        }

        // 工具函数
        function showEmptyState(container, message) {
            container.innerHTML = `
                <div class="empty-state">
                    <p>${message}</p>
                </div>
            `;
        }

        function formatStatus(status) {
            const statusMap = {
                'pending': '<span class="status-badge status-pending">待处理</span>',
                'processing': '<span class="status-badge status-processing">处理中</span>',
                'completed': '<span class="status-badge status-completed">正常</span>',
                'failed': '<span class="status-badge status-failed">异常</span>'
            };
            return statusMap[status] || status;
        }

        function formatDateTime(dateTime) {
            if (!dateTime) return '-';
            return new Date(dateTime).toLocaleString('zh-CN');
        }

        // 过滤器相关
        function applyFilters() {
            currentFilters = {
                date_from: document.getElementById('dateFrom').value,
                date_to: document.getElementById('dateTo').value,
                status: document.getElementById('statusFilter').value,
                matter_name: document.getElementById('matterFilter').value
            };

            Object.keys(currentFilters).forEach(key => {
                if (!currentFilters[key]) {
                    delete currentFilters[key];
                }
            });

            currentPage = 1;
            loadPreviewRecords();
            loadStatistics();
        }

        function resetFilters() {
            document.getElementById('dateFrom').value = '';
            document.getElementById('dateTo').value = '';
            document.getElementById('statusFilter').value = '';
            document.getElementById('matterFilter').value = '';
            
            currentFilters = {};
            currentPage = 1;
            loadPreviewRecords();
            loadStatistics();
        }

        // 刷新数据
        function refreshBusinessData() {
            loadBusinessData();
        }

        function refreshSystemData() {
            loadSystemData();
        }

        // 操作函数
        function viewPreview(previewId) {
            const url = `/static/index.html?previewId=${previewId}&verified=true`;
            window.open(url, '_blank');
        }

        function downloadResult(previewId) {
            const url = `/api/download?file=${previewId}.pdf`;
            window.open(url, '_blank');
        }

        function exportBusinessData() {
            const params = new URLSearchParams({
                export: 'csv',
                ...currentFilters
            });
            
            const url = `/api/preview/records?${params}`;
            window.open(url, '_blank');
        }

        function exportSystemData() {
            alert('系统数据导出功能开发中');
        }
    </script>
</body>
</html>
